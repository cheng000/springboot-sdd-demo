server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: springboot-mybatis-demo
  profiles:
    active: dev
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/demo_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    username: postgres
    password: postgres
    hikari:
      minimum-idle: 5
      maximum-pool-size: 15
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.demo.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: true
    default-fetch-size: 100
    default-statement-timeout: 30
  check-config-location: false

# ===== SpringDoc OpenAPI =====
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha           # 接口分组按字母排序
    operations-sorter: alpha     # 接口内方法按字母排序
  default-flat-param-object: true
  group-configs:
    - group: default
      paths-to-match: /**
      packages-to-scan: com.example.demo.controller

# ===== Knife4j 增强 =====
knife4j:
  enable: true
  setting:
    language: zh_cn              # 中文 UI
    enable-swagger-models: true  # 显示数据模型
    enable-document: true        # 启用聚合文档
    enable-footer: false
    enable-after-script: true    # 调试后注入脚本（响应示例）

logging:
  level:
    root: INFO
    com.example.demo: DEBUG
    com.example.demo.mapper: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
